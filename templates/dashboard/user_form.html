{% extends "base.html" %}
{% block title %}Nuevo usuario staff{% endblock %}
{% block content %}
<section class="section">
  <div class="container narrow">
    <div class="card form-card">
      <span class="eyebrow">Solo dueños</span>
      <h1>Nuevo usuario staff</h1>
      <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
          <div class="form-row">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}<small class="error-text">{{ error }}</small>{% endfor %}
          </div>
        {% endfor %}
        <div class="form-row">
          <label for="id_password">Contraseña</label>
          <input type="password" name="password" id="id_password" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">Crear usuario</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
